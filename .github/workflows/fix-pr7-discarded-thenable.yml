name: Fix PR 7 discarded thenables

on:
  push:
    branches:
      - agent/fix-audit-findings
    paths:
      - .github/workflows/fix-pr7-discarded-thenable.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: agent/fix-audit-findings
          fetch-depth: 0
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Apply fix and regression
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one match in {path}, found {count}"
                  )
              path.write_text(text.replace(old, new, 1))

          worker_pool = Path("packages/comlink-worker-pool/src/WorkerPool.ts")
          regression = Path(
              "packages/comlink-worker-pool/src/WorkerPool.regression.test.ts"
          )

          replace_once(
              worker_pool,
              """\t\t\t\tconst result = Reflect.apply(method, worker.proxy, item.task.args);
\t\t\t\tif (
\t\t\t\t\t!this._containsWorker(worker) ||
\t\t\t\t\t!worker.activeTasks.has(item) ||
\t\t\t\t\tthis._expireTaskIfNeeded(worker, item)
\t\t\t\t) {
\t\t\t\t\treturn undefined;
\t\t\t\t}
\t\t\t\treturn result;""",
              """\t\t\t\tconst result = Reflect.apply(method, worker.proxy, item.task.args);
\t\t\t\tif (
\t\t\t\t\t!this._containsWorker(worker) ||
\t\t\t\t\t!worker.activeTasks.has(item) ||
\t\t\t\t\tthis._expireTaskIfNeeded(worker, item)
\t\t\t\t) {
\t\t\t\t\tisolateAsyncFailure(result);
\t\t\t\t\treturn undefined;
\t\t\t\t}
\t\t\t\treturn result;""",
          )

          regression_test = """
\ttest("consumes thenables discarded after synchronous worker failure", async () => {
\t\tconst worker = new RegressionWorker();
\t\tconst rejection = new Error("discarded rejection");
\t\tlet thenCalls = 0;
\t\tconst thenable = {
\t\t\tthen: (
\t\t\t\t_resolve: (value: string) => void,
\t\t\t\treject: (reason: unknown) => void,
\t\t\t) => {
\t\t\t\tthenCalls++;
\t\t\t\treject(rejection);
\t\t\t},
\t\t} as unknown as PromiseLike<string>;
\t\tconst pool = new WorkerPool<{ run(): PromiseLike<string> }>({
\t\t\tsize: 1,
\t\t\ttaskTimeoutMs: false,
\t\t\tworkerFactory: () => asWorker(worker),
\t\t\tproxyFactory: () => ({
\t\t\t\trun: () => {
\t\t\t\t\tworker.dispatchEvent(new Event("error"));
\t\t\t\t\treturn thenable;
\t\t\t\t},
\t\t\t}),
\t\t});

\t\tawait expect(pool.run("run", [])).rejects.toBeInstanceOf(
\t\t\tWorkerCrashedError,
\t\t);
\t\tawait flushMicrotasks();
\t\texpect(thenCalls).toBe(1);
\t\tawait pool.close();
\t});
"""
          replace_once(
              regression,
              '\n\ttest("failure settlement events observe already-decremented running counts", async () => {',
              regression_test
              + '\n\ttest("failure settlement events observe already-decremented running counts", async () => {',
          )

          Path(".github/workflows/fix-pr7-discarded-thenable.yml").unlink()
          PY
      - name: Run targeted regression tests
        id: targeted-tests
        shell: bash
        run: |
          set -o pipefail
          bun test packages/comlink-worker-pool/src/WorkerPool.regression.test.ts 2>&1 | tee /tmp/pr7-targeted-test.log
      - name: Upload targeted test failure
        if: failure() && steps.targeted-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pr7-discarded-thenable-test-log
          path: /tmp/pr7-targeted-test.log
          retention-days: 1
      - name: Run full non-browser verification
        run: bun run verify
      - name: Commit reviewed fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Consume discarded worker thenables"
          git push origin HEAD:agent/fix-audit-findings
