name: Run PR 7 review fixer

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/fix-audit-findings'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: agent/fix-audit-findings
          fetch-depth: 0
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Execute reviewed transformation
        shell: bash
        run: |
          python3 <<'PY'
          import subprocess
          from pathlib import Path

          subprocess.run(["git", "fetch", "origin", "main"], check=True)
          subprocess.run(
              ["git", "checkout", "origin/main", "--", "package.json"],
              check=True,
          )

          workflow = Path(".github/workflows/apply-pr7-review-fixes.yml")
          lines = workflow.read_text().splitlines()
          start_marker = "          python3 <<'PY'"
          end_marker = "          PY"
          start = lines.index(start_marker) + 1
          end = lines.index(end_marker, start)
          code = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in lines[start:end]
          )
          raw_marker = "reviewed_tests = r'''"
          if code.count(raw_marker) != 1:
              raise RuntimeError("Unexpected reviewed test template")
          code = code.replace(raw_marker, "reviewed_tests = '''", 1)
          exec(compile(code, str(workflow), "exec"), {})

          Path(".github/workflows/kick-pr7-review-fixes.yml").unlink()
          Path("scripts/emit-pr7-review-fixes.py").unlink(missing_ok=True)

          changeset = Path(".changeset/bright-workers-rest.md")
          old_summary = (
              "Fix scheduler reentrancy, task outcome accounting, queue deadlines, "
              "React binding isolation, callable state values, and interface-based "
              "API typings."
          )
          new_summary = (
              "Fix scheduler reentrancy, task outcome accounting, queue deadlines "
              "under blocked event loops, bounded no-progress retries, React binding "
              "isolation, callable state values, and interface-based API typings."
          )
          text = changeset.read_text()
          if text.count(old_summary) != 1:
              raise RuntimeError("Unexpected Changeset summary")
          changeset.write_text(text.replace(old_summary, new_summary, 1))
          PY
      - name: Run targeted regression tests
        id: targeted-tests
        shell: bash
        run: |
          set -o pipefail
          bun test packages/comlink-worker-pool/src/WorkerPool.regression.test.ts 2>&1 | tee targeted-test.log
      - name: Upload targeted test failure
        if: failure() && steps.targeted-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pr7-targeted-test-log
          path: targeted-test.log
          retention-days: 1
      - name: Run full non-browser verification
        run: bun run verify
      - name: Commit reviewed fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Harden deadlines against blocked event loops"
          git push origin HEAD:agent/fix-audit-findings
