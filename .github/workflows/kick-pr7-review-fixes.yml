name: Run PR 7 review fixer

on:
  push:
    branches:
      - agent/fix-audit-findings
    paths:
      - .github/workflows/kick-pr7-review-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: agent/fix-audit-findings
          fetch-depth: 0
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Execute reviewed transformation
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          workflow = Path(".github/workflows/apply-pr7-review-fixes.yml")
          lines = workflow.read_text().splitlines()
          start_marker = "          python3 <<'PY'"
          end_marker = "          PY"
          start = lines.index(start_marker) + 1
          end = lines.index(end_marker, start)
          code = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in lines[start:end]
          )
          exec(compile(code, str(workflow), "exec"), {})
          Path(".github/workflows/kick-pr7-review-fixes.yml").unlink()
          PY
      - name: Run targeted regression tests
        run: bun test packages/comlink-worker-pool/src/WorkerPool.regression.test.ts
      - name: Run full non-browser verification
        run: bun run verify
      - name: Commit reviewed fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Harden deadlines against blocked event loops"
          git push origin HEAD:agent/fix-audit-findings
