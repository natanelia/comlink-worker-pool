name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize-review:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/fix-audit-findings'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: agent/fix-audit-findings
          fetch-depth: 0
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Apply the verified discarded-thenable fix
        run: python3 scripts/apply-discarded-thenable-fix.py
      - name: Restore the standard workflow
        shell: bash
        run: |
          git fetch --prune origin main agent/fix-audit-findings
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f scripts/apply-discarded-thenable-fix.py
      - name: Run full non-browser verification
        run: bun run verify
      - name: Commit the reviewed fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Consume discarded worker thenables"
          git push origin HEAD:agent/fix-audit-findings

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint all workspaces
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck all workspaces
        run: bun run typecheck

  version-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Materialize pending Changesets
        run: bun run version
      - name: Validate generated version files
        run: bun run lint && git diff --check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build comlink-worker-pool
        run: bun run --filter comlink-worker-pool build
      - name: Test comlink-worker-pool
        run: bun run --filter comlink-worker-pool test
      - name: Test comlink-worker-pool-react
        run: bun run --filter comlink-worker-pool-react test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build comlink-worker-pool
        run: bun run --filter comlink-worker-pool build
      - name: Build comlink-worker-pool-react
        run: bun run --filter comlink-worker-pool-react build
      - name: Check scheduler and bundle budgets
        run: bun run benchmark:runtime && bun run benchmark:bundle
      - name: Build playground
        run: bun run playground:build
      - name: Validate packed packages and consumer imports
        run: bun run test:packages

  browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install browser engines and system dependencies
        run: bunx playwright install --with-deps chromium firefox webkit
      - name: Build publishable packages
        run: bun run build
      - name: Test real workers in Chromium, Firefox, and WebKit
        run: bun run test:browser
