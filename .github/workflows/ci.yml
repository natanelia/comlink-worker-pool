name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint all workspaces
        run: bun run lint
      - name: Upload verified review files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr7-final-reviewed-files
          path: |
            packages/comlink-worker-pool/src/WorkerPool.ts
            packages/comlink-worker-pool/src/WorkerPool.regression.test.ts
          retention-days: 1

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck all workspaces
        run: bun run typecheck

  version-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Materialize pending Changesets
        run: bun run version
      - name: Validate generated version files
        run: bun run lint && git diff --check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build comlink-worker-pool
        run: bun run --filter comlink-worker-pool build
      - name: Test comlink-worker-pool
        run: bun run --filter comlink-worker-pool test
      - name: Test comlink-worker-pool-react
        run: bun run --filter comlink-worker-pool-react test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build comlink-worker-pool
        run: bun run --filter comlink-worker-pool build
      - name: Build comlink-worker-pool-react
        run: bun run --filter comlink-worker-pool-react build
      - name: Check scheduler and bundle budgets
        run: bun run benchmark:runtime && bun run benchmark:bundle
      - name: Build playground
        run: bun run playground:build
      - name: Validate packed packages and consumer imports
        run: bun run test:packages

  browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install browser engines and system dependencies
        run: bunx playwright install --with-deps chromium firefox webkit
      - name: Build publishable packages
        run: bun run build
      - name: Test real workers in Chromium, Firefox, and WebKit
        run: bun run test:browser
