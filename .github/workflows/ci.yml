name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

jobs:
  review-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/fix-audit-findings'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Apply reviewed fix and regression
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one match in {path}, found {count}"
                  )
              path.write_text(text.replace(old, new, 1))

          worker_pool = Path("packages/comlink-worker-pool/src/WorkerPool.ts")
          regression = Path(
              "packages/comlink-worker-pool/src/WorkerPool.regression.test.ts"
          )

          replace_once(
              worker_pool,
              """\t\t\t\tconst result = Reflect.apply(method, worker.proxy, item.task.args);
\t\t\t\tif (
\t\t\t\t\t!this._containsWorker(worker) ||
\t\t\t\t\t!worker.activeTasks.has(item) ||
\t\t\t\t\tthis._expireTaskIfNeeded(worker, item)
\t\t\t\t) {
\t\t\t\t\treturn undefined;
\t\t\t\t}
\t\t\t\treturn result;""",
              """\t\t\t\tconst result = Reflect.apply(method, worker.proxy, item.task.args);
\t\t\t\tif (
\t\t\t\t\t!this._containsWorker(worker) ||
\t\t\t\t\t!worker.activeTasks.has(item) ||
\t\t\t\t\tthis._expireTaskIfNeeded(worker, item)
\t\t\t\t) {
\t\t\t\t\tisolateAsyncFailure(result);
\t\t\t\t\treturn undefined;
\t\t\t\t}
\t\t\t\treturn result;""",
          )

          regression_test = """
\ttest("consumes thenables discarded after synchronous worker failure", async () => {
\t\tconst worker = new RegressionWorker();
\t\tconst rejection = new Error("discarded rejection");
\t\tlet thenCalls = 0;
\t\tconst thenable = {
\t\t\tthen: (
\t\t\t\t_resolve: (value: string) => void,
\t\t\t\treject: (reason: unknown) => void,
\t\t\t) => {
\t\t\t\tthenCalls++;
\t\t\t\treject(rejection);
\t\t\t},
\t\t} as unknown as PromiseLike<string>;
\t\tconst pool = new WorkerPool<{ run(): PromiseLike<string> }>({
\t\t\tsize: 1,
\t\t\ttaskTimeoutMs: false,
\t\t\tworkerFactory: () => asWorker(worker),
\t\t\tproxyFactory: () => ({
\t\t\t\trun: () => {
\t\t\t\t\tworker.dispatchEvent(new Event("error"));
\t\t\t\t\treturn thenable;
\t\t\t\t},
\t\t\t}),
\t\t});

\t\tawait expect(pool.run("run", [])).rejects.toBeInstanceOf(
\t\t\tWorkerCrashedError,
\t\t);
\t\tawait flushMicrotasks();
\t\texpect(thenCalls).toBe(1);
\t\tawait pool.close();
\t});
"""
          replace_once(
              regression,
              '\n\ttest("failure settlement events observe already-decremented running counts", async () => {',
              regression_test
              + '\n\ttest("failure settlement events observe already-decremented running counts", async () => {',
          )
          PY
      - name: Run targeted regression tests
        run: bun test packages/comlink-worker-pool/src/WorkerPool.regression.test.ts
      - name: Run full non-browser verification
        run: bun run verify
      - name: Upload verified source files
        uses: actions/upload-artifact@v4
        with:
          name: pr7-final-reviewed-files
          path: |
            packages/comlink-worker-pool/src/WorkerPool.ts
            packages/comlink-worker-pool/src/WorkerPool.regression.test.ts
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint all workspaces
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck all workspaces
        run: bun run typecheck

  version-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Materialize pending Changesets
        run: bun run version
      - name: Validate generated version files
        run: bun run lint && git diff --check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build comlink-worker-pool
        run: bun run --filter comlink-worker-pool build
      - name: Test comlink-worker-pool
        run: bun run --filter comlink-worker-pool test
      - name: Test comlink-worker-pool-react
        run: bun run --filter comlink-worker-pool-react test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build comlink-worker-pool
        run: bun run --filter comlink-worker-pool build
      - name: Build comlink-worker-pool-react
        run: bun run --filter comlink-worker-pool-react build
      - name: Check scheduler and bundle budgets
        run: bun run benchmark:runtime && bun run benchmark:bundle
      - name: Build playground
        run: bun run playground:build
      - name: Validate packed packages and consumer imports
        run: bun run test:packages

  browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install browser engines and system dependencies
        run: bunx playwright install --with-deps chromium firefox webkit
      - name: Build publishable packages
        run: bun run build
      - name: Test real workers in Chromium, Firefox, and WebKit
        run: bun run test:browser
