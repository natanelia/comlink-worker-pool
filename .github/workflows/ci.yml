name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint all workspaces
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck all workspaces
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build comlink-worker-pool
        run: bun run --filter comlink-worker-pool build
      - name: Test comlink-worker-pool
        run: bun run --filter comlink-worker-pool test
      - name: Test comlink-worker-pool-react
        run: bun run --filter comlink-worker-pool-react test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build comlink-worker-pool
        run: bun run --filter comlink-worker-pool build
      - name: Build comlink-worker-pool-react
        run: bun run --filter comlink-worker-pool-react build
      - name: Build playground
        run: bun run playground:build
      - name: Smoke test ESM and CommonJS package exports
        run: bun run test:exports
