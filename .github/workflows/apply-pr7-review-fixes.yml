name: Apply PR 7 review fixes

on:
  push:
    branches:
      - agent/fix-audit-findings
    paths:
      - .github/workflows/apply-pr7-review-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: agent/fix-audit-findings
          fetch-depth: 0
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Apply reviewed fixes and regression tests
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one match in {path}, found {count}: {old[:80]!r}"
                  )
              path.write_text(text.replace(old, new, 1))

          worker_pool = Path("packages/comlink-worker-pool/src/WorkerPool.ts")
          scheduler = Path("packages/comlink-worker-pool/src/internal/scheduler.ts")
          regression = Path(
              "packages/comlink-worker-pool/src/WorkerPool.regression.test.ts"
          )

          replace_once(
              scheduler,
              "\tabortHandler?: () => void;\n\tqueueTimeout?: ReturnType<typeof setTimeout>;\n\ttimeout?: ReturnType<typeof setTimeout>;",
              "\tabortHandler?: () => void;\n\tqueueTimeout?: ReturnType<typeof setTimeout>;\n\tqueueDeadline?: number;\n\ttimeout?: ReturnType<typeof setTimeout>;",
          )

          replace_once(
              worker_pool,
              "\t\tconst deadline = item.enqueuedAt + timeoutMs;\n\t\tconst schedule = () => {",
              "\t\tconst deadline = item.enqueuedAt + timeoutMs;\n\t\titem.queueDeadline = deadline;\n\t\tconst schedule = () => {",
          )

          replace_once(
              worker_pool,
              "\t\tschedule();\n\t}\n\n\tprivate _next(): void {",
              """\t\tschedule();
\t}

\tprivate _expireQueuedTaskIfNeeded(
\t\titem: ScheduledTask<TTask, TResult>,
\t): boolean {
\t\tconst deadline = item.queueDeadline;
\t\tif (deadline === undefined || monotonicNow() < deadline) return false;
\t\tthis._settleTask(
\t\t\titem,
\t\t\tfalse,
\t\t\tnew WorkerQueueTimeoutError(deadline - item.enqueuedAt),
\t\t\t"queue-timeout",
\t\t);
\t\treturn true;
\t}

\tprivate _next(): void {""",
          )

          replace_once(
              worker_pool,
              "\t\tthis.scheduling = true;\n\n\t\ttry {\n\t\t\tdo {\n\t\t\t\tthis.rescheduleRequested = false;",
              "\t\tthis.scheduling = true;\n\t\tlet retriedWithoutProgress = false;\n\n\t\ttry {\n\t\t\tdo {\n\t\t\t\tconst startedTasksBeforePass = this.startedTasks;\n\t\t\t\tthis.rescheduleRequested = false;",
          )

          replace_once(
              worker_pool,
              "\t\t\t\tthis._rejectQueueIfPermanentlyExhausted();\n\t\t\t} while (this.rescheduleRequested && !this.terminationStarted);",
              """\t\t\t\tthis._rejectQueueIfPermanentlyExhausted();
\t\t\t\tif (
\t\t\t\t\tthis.rescheduleRequested &&
\t\t\t\t\tthis.startedTasks === startedTasksBeforePass
\t\t\t\t) {
\t\t\t\t\tif (retriedWithoutProgress) break;
\t\t\t\t\tretriedWithoutProgress = true;
\t\t\t\t} else {
\t\t\t\t\tretriedWithoutProgress = false;
\t\t\t\t}
\t\t\t} while (this.rescheduleRequested && !this.terminationStarted);""",
          )

          replace_once(
              worker_pool,
              "\t\tthis._startLifetimeTimer(worker);\n\t\tthis._startIdleTimer(worker);\n\t\treturn worker;",
              "\t\tthis._startLifetimeTimer(worker);\n\t\tif (!this._containsWorker(worker)) return null;\n\t\tthis._startIdleTimer(worker);\n\t\treturn worker;",
          )

          replace_once(
              worker_pool,
              "\t): void {\n\t\tif (item.queueTimeout !== undefined) clearTimeout(item.queueTimeout);\n\t\titem.queueTimeout = undefined;\n\t\tthis._clearIdleTimer(worker);",
              "\t): void {\n\t\tif (this._expireQueuedTaskIfNeeded(item)) return;\n\t\tif (item.queueTimeout !== undefined) clearTimeout(item.queueTimeout);\n\t\titem.queueTimeout = undefined;\n\t\titem.queueDeadline = undefined;\n\t\tthis._clearIdleTimer(worker);",
          )

          replace_once(
              worker_pool,
              """\t\tvoid Promise.resolve()
\t\t\t.then(() => {
\t\t\t\tif (!this._containsWorker(worker) || !worker.activeTasks.has(item)) {
\t\t\t\t\treturn undefined;
\t\t\t\t}
\t\t\t\tconst method = worker.proxy[item.task.method];
\t\t\t\tif (!this._containsWorker(worker) || !worker.activeTasks.has(item)) {
\t\t\t\t\treturn undefined;
\t\t\t\t}
\t\t\t\tif (typeof method !== "function") {
\t\t\t\t\tthrow new TypeError(
\t\t\t\t\t\t`Worker proxy method ${String(item.task.method)} is not a function`,
\t\t\t\t\t);
\t\t\t\t}
\t\t\t\treturn Reflect.apply(method, worker.proxy, item.task.args);
\t\t\t})""",
              """\t\tvoid Promise.resolve()
\t\t\t.then(() => {
\t\t\t\tif (
\t\t\t\t\t!this._containsWorker(worker) ||
\t\t\t\t\t!worker.activeTasks.has(item) ||
\t\t\t\t\tthis._expireTaskIfNeeded(worker, item)
\t\t\t\t) {
\t\t\t\t\treturn undefined;
\t\t\t\t}
\t\t\t\tconst method = worker.proxy[item.task.method];
\t\t\t\tif (
\t\t\t\t\t!this._containsWorker(worker) ||
\t\t\t\t\t!worker.activeTasks.has(item) ||
\t\t\t\t\tthis._expireTaskIfNeeded(worker, item)
\t\t\t\t) {
\t\t\t\t\treturn undefined;
\t\t\t\t}
\t\t\t\tif (typeof method !== "function") {
\t\t\t\t\tthrow new TypeError(
\t\t\t\t\t\t`Worker proxy method ${String(item.task.method)} is not a function`,
\t\t\t\t\t);
\t\t\t\t}
\t\t\t\tconst result = Reflect.apply(method, worker.proxy, item.task.args);
\t\t\t\tif (
\t\t\t\t\t!this._containsWorker(worker) ||
\t\t\t\t\t!worker.activeTasks.has(item) ||
\t\t\t\t\tthis._expireTaskIfNeeded(worker, item)
\t\t\t\t) {
\t\t\t\t\treturn undefined;
\t\t\t\t}
\t\t\t\treturn result;
\t\t\t})""",
          )

          replace_once(
              worker_pool,
              "\t): void {\n\t\tif (!worker.activeTasks.delete(item)) return;\n\t\tthis._settleTask(item, succeeded, value);",
              "\t): void {\n\t\tif (!this._containsWorker(worker) || !worker.activeTasks.has(item)) return;\n\t\tif (this._expireTaskIfNeeded(worker, item)) return;\n\t\tworker.activeTasks.delete(item);\n\t\tthis._settleTask(item, succeeded, value);",
          )

          replace_once(
              worker_pool,
              "\t\tif (item.queueTimeout !== undefined) clearTimeout(item.queueTimeout);\n\t\titem.queueTimeout = undefined;\n\t\tif (!preserveTaskTimer) {",
              "\t\tif (item.queueTimeout !== undefined) clearTimeout(item.queueTimeout);\n\t\titem.queueTimeout = undefined;\n\t\titem.queueDeadline = undefined;\n\t\tif (!preserveTaskTimer) {",
          )

          replace_once(
              worker_pool,
              """\tprivate _startTaskTimer(
\t\tworker: WorkerMetadata<TProxy, TTask, TResult>,
\t\titem: ScheduledTask<TTask, TResult>,
\t): void {
\t\tconst timeoutMs = this.taskTimeoutMs;
\t\tif (timeoutMs === undefined) return;
\t\tconst deadline = monotonicNow() + timeoutMs;
\t\tconst schedule = () => {
\t\t\tif (!worker.activeTasks.has(item)) return;
\t\t\tconst remaining = deadline - monotonicNow();
\t\t\tif (remaining > 0) {
\t\t\t\titem.timeout = setTimeout(
\t\t\t\t\tschedule,
\t\t\t\t\tMath.min(remaining, MAX_TIMER_DELAY_MS),
\t\t\t\t);
\t\t\t\treturn;
\t\t\t}
\t\t\titem.timeout = undefined;
\t\t\tthis._handleWorkerFailure(
\t\t\t\tworker,
\t\t\t\tnew WorkerTaskTimeoutError(timeoutMs),
\t\t\t\titem,
\t\t\t);
\t\t};
\t\titem.timeout = setTimeout(
\t\t\tschedule,
\t\t\tMath.min(timeoutMs, MAX_TIMER_DELAY_MS),
\t\t);
\t}""",
              """\tprivate _expireTaskIfNeeded(
\t\tworker: WorkerMetadata<TProxy, TTask, TResult>,
\t\titem: ScheduledTask<TTask, TResult>,
\t): boolean {
\t\tconst timeoutMs = this.taskTimeoutMs;
\t\tif (
\t\t\ttimeoutMs === undefined ||
\t\t\titem.startedAt === undefined ||
\t\t\tmonotonicNow() - item.startedAt < timeoutMs
\t\t) {
\t\t\treturn false;
\t\t}
\t\tthis._handleWorkerFailure(
\t\t\tworker,
\t\t\tnew WorkerTaskTimeoutError(timeoutMs),
\t\t\titem,
\t\t);
\t\treturn true;
\t}

\tprivate _startTaskTimer(
\t\tworker: WorkerMetadata<TProxy, TTask, TResult>,
\t\titem: ScheduledTask<TTask, TResult>,
\t): void {
\t\tconst timeoutMs = this.taskTimeoutMs;
\t\tconst startedAt = item.startedAt;
\t\tif (timeoutMs === undefined || startedAt === undefined) return;
\t\tconst deadline = startedAt + timeoutMs;
\t\tconst schedule = () => {
\t\t\tif (!worker.activeTasks.has(item)) return;
\t\t\tconst remaining = deadline - monotonicNow();
\t\t\tif (remaining > 0) {
\t\t\t\titem.timeout = setTimeout(
\t\t\t\t\tschedule,
\t\t\t\t\tMath.min(remaining, MAX_TIMER_DELAY_MS),
\t\t\t\t);
\t\t\t\treturn;
\t\t\t}
\t\t\titem.timeout = undefined;
\t\t\tthis._expireTaskIfNeeded(worker, item);
\t\t};
\t\tschedule();
\t}""",
          )

          replace_once(
              worker_pool,
              """\t\tworker.lifetimeTimer = setTimeout(
\t\t\tschedule,
\t\t\tMath.min(this.maxWorkerLifetimeMs, MAX_TIMER_DELAY_MS),
\t\t);""",
              "\t\tschedule();",
          )

          replace_once(
              regression,
              """async function flushMicrotasks(): Promise<void> {
\tfor (let index = 0; index < 8; index++) await Promise.resolve();
}""",
              """async function flushMicrotasks(): Promise<void> {
\tfor (let index = 0; index < 8; index++) await Promise.resolve();
}

function blockEventLoopFor(durationMs: number): void {
\tconst signal = new Int32Array(
\t\tnew SharedArrayBuffer(Int32Array.BYTES_PER_ELEMENT),
\t);
\tAtomics.wait(signal, 0, 0, durationMs);
}""",
          )

          reviewed_tests = r'''
\ttest("rechecks queue deadlines after synchronous worker setup", async () => {
\t\tlet invocations = 0;
\t\tconst pool = new WorkerPool<{ run(): Promise<string> }>({
\t\t\tsize: 1,
\t\t\ttaskTimeoutMs: false,
\t\t\tworkerFactory: () => asWorker(new RegressionWorker()),
\t\t\tproxyFactory: () => ({
\t\t\t\trun: async () => {
\t\t\t\t\tinvocations++;
\t\t\t\t\treturn "late";
\t\t\t\t},
\t\t\t}),
\t\t\tonEvent: (event) => {
\t\t\t\tif (event.type === "worker-created") blockEventLoopFor(20);
\t\t\t},
\t\t});

\t\tawait expect(
\t\t\tpool.run("run", [], { queueTimeoutMs: 5 }),
\t\t).rejects.toBeInstanceOf(WorkerQueueTimeoutError);
\t\tawait flushMicrotasks();
\t\texpect(invocations).toBe(0);
\t\texpect(pool.getStats()).toMatchObject({
\t\t\tstartedTasks: 0,
\t\t\ttimedOutTasks: 1,
\t\t});
\t\tawait pool.close();
\t});

\ttest("rechecks task deadlines after synchronous task-started observers", async () => {
\t\tlet invocations = 0;
\t\tconst workers: RegressionWorker[] = [];
\t\tconst pool = new WorkerPool<{ run(): Promise<string> }>({
\t\t\tsize: 1,
\t\t\ttaskTimeoutMs: 5,
\t\t\tworkerFactory: () => {
\t\t\t\tconst worker = new RegressionWorker();
\t\t\t\tworkers.push(worker);
\t\t\t\treturn asWorker(worker);
\t\t\t},
\t\t\tproxyFactory: () => ({
\t\t\t\trun: async () => {
\t\t\t\t\tinvocations++;
\t\t\t\t\treturn "late";
\t\t\t\t},
\t\t\t}),
\t\t\tonEvent: (event) => {
\t\t\t\tif (event.type === "task-started") blockEventLoopFor(20);
\t\t\t},
\t\t});

\t\tawait expect(pool.run("run", [])).rejects.toBeInstanceOf(
\t\t\tWorkerTaskTimeoutError,
\t\t);
\t\tawait flushMicrotasks();
\t\texpect(invocations).toBe(0);
\t\texpect(workers[0].terminateCalls).toBe(1);
\t\texpect(pool.getStats().timedOutTasks).toBe(1);
\t\tawait pool.close();
\t});

\ttest("does not invoke a proxy method after its getter crosses the task deadline", async () => {
\t\tlet invocations = 0;
\t\tconst proxy = Object.create(null) as { run(): Promise<string> };
\t\tObject.defineProperty(proxy, "run", {
\t\t\tget: () => {
\t\t\t\tblockEventLoopFor(20);
\t\t\t\treturn async () => {
\t\t\t\t\tinvocations++;
\t\t\t\t\treturn "late";
\t\t\t\t};
\t\t\t},
\t\t});
\t\tconst pool = new WorkerPool<{ run(): Promise<string> }>({
\t\t\tsize: 1,
\t\t\ttaskTimeoutMs: 5,
\t\t\tworkerFactory: () => asWorker(new RegressionWorker()),
\t\t\tproxyFactory: () => proxy,
\t\t});

\t\tawait expect(pool.run("run", [])).rejects.toBeInstanceOf(
\t\t\tWorkerTaskTimeoutError,
\t\t);
\t\tawait flushMicrotasks();
\t\texpect(invocations).toBe(0);
\t\tawait pool.close();
\t});

\ttest("retires workers whose lifetime expires during worker-created observers", async () => {
\t\tconst workers: RegressionWorker[] = [];
\t\tconst invokedOn: RegressionWorker[] = [];
\t\tlet blockedFirstWorker = false;
\t\tconst pool = new WorkerPool<{ run(): Promise<string> }>({
\t\t\tsize: 1,
\t\t\tmaxWorkerLifetimeMs: 5,
\t\t\tworkerFactory: () => {
\t\t\t\tconst worker = new RegressionWorker();
\t\t\t\tworkers.push(worker);
\t\t\t\treturn asWorker(worker);
\t\t\t},
\t\t\tproxyFactory: (worker) => ({
\t\t\t\trun: async () => {
\t\t\t\t\tinvokedOn.push(worker as unknown as RegressionWorker);
\t\t\t\t\treturn "replacement";
\t\t\t\t},
\t\t\t}),
\t\t\tonEvent: (event) => {
\t\t\t\tif (event.type === "worker-created" && !blockedFirstWorker) {
\t\t\t\t\tblockedFirstWorker = true;
\t\t\t\t\tblockEventLoopFor(20);
\t\t\t\t}
\t\t\t},
\t\t});

\t\tawait expect(pool.run("run", [])).resolves.toBe("replacement");
\t\texpect(workers).toHaveLength(2);
\t\texpect(workers[0].terminateCalls).toBe(1);
\t\texpect(invokedOn).toEqual([workers[1]]);
\t\tawait pool.close();
\t});

\ttest("bounds synchronous retries when worker-created observers keep failing workers", async () => {
\t\tconst workers: RegressionWorker[] = [];
\t\tlet failuresRemaining = 3;
\t\tconst pool = new WorkerPool<{ run(value: string): Promise<string> }>({
\t\t\tsize: 1,
\t\t\ttaskTimeoutMs: false,
\t\t\tworkerFactory: () => {
\t\t\t\tconst worker = new RegressionWorker();
\t\t\t\tworkers.push(worker);
\t\t\t\treturn asWorker(worker);
\t\t\t},
\t\t\tproxyFactory: () => ({ run: async (value) => value }),
\t\t\tonEvent: (event) => {
\t\t\t\tif (event.type === "worker-created" && failuresRemaining > 0) {
\t\t\t\t\tfailuresRemaining--;
\t\t\t\t\tworkers.at(-1)?.dispatchEvent(new Event("error"));
\t\t\t\t}
\t\t\t},
\t\t});

\t\tconst first = pool.run("run", ["first"]);
\t\texpect(workers).toHaveLength(2);
\t\texpect(pool.getStats()).toMatchObject({ queue: 1, startedTasks: 0 });

\t\tfailuresRemaining = 0;
\t\tconst second = pool.run("run", ["second"]);
\t\tawait expect(Promise.all([first, second])).resolves.toEqual([
\t\t\t"first",
\t\t\t"second",
\t\t]);
\t\texpect(workers).toHaveLength(3);
\t\tawait pool.close();
\t});
'''

          replace_once(
              regression,
              '\n\ttest("failure settlement events observe already-decremented running counts", async () => {',
              reviewed_tests
              + '\n\ttest("failure settlement events observe already-decremented running counts", async () => {',
          )

          Path(".github/workflows/apply-pr7-review-fixes.yml").unlink()
          PY
      - name: Run targeted regression tests
        run: bun test packages/comlink-worker-pool/src/WorkerPool.regression.test.ts
      - name: Run full non-browser verification
        run: bun run verify
      - name: Commit reviewed fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Harden deadlines against blocked event loops"
          git push origin HEAD:agent/fix-audit-findings
